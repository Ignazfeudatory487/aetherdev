version: '3.9'

# ─── AetherDev Docker Compose ─────────────────────────────────────────────────
# Services: aetherdev, redis, chromadb, ollama (optional)
# Run: docker-compose up -d
# Stop: docker-compose down

services:
  # ─── Main AetherDev Service ─────────────────────────────────────────────────
  aetherdev:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: aetherdev:latest
    container_name: aetherdev
    restart: unless-stopped
    ports:
      - "3001:3001"     # API + WebSocket
      - "5173:5173"     # Web UI (dev mode)
    environment:
      - NODE_ENV=production
      - AETHER_PORT=3001
      - AETHER_HOST=0.0.0.0
      - AETHER_LOG_LEVEL=info
      - AETHER_LOG_FORMAT=json
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-codellama:13b}
      - REDIS_URL=redis://redis:6379
      - SQLITE_PATH=/app/data/aetherdev.db
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - SANDBOX_ENABLED=true
      - PLUGINS_DIR=/app/plugins
      - PLUGINS_AUTO_RELOAD=true
      - TELEMETRY_ENABLED=false
    volumes:
      - aether_data:/app/data
      - aether_plugins:/app/plugins
      - ./.env:/app/.env:ro
    depends_on:
      redis:
        condition: service_healthy
      chromadb:
        condition: service_started
    networks:
      - aether_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
        reservations:
          memory: 512M

  # ─── Redis Cache ────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: aether_redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - aether_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 300M

  # ─── ChromaDB Vector Store ──────────────────────────────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    container_name: aether_chroma
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/data
      - ANONYMIZED_TELEMETRY=FALSE
    volumes:
      - chroma_data:/chroma/data
    networks:
      - aether_network
    deploy:
      resources:
        limits:
          memory: 1G

  # ─── Ollama Local LLM ───────────────────────────────────────────────────────
  # Optional: comment out if you're using external Ollama
  ollama:
    image: ollama/ollama:latest
    container_name: aether_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    networks:
      - aether_network
    environment:
      - OLLAMA_KEEP_ALIVE=5m
      - OLLAMA_NUM_PARALLEL=2
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: '4.0'
        reservations:
          memory: 2G
    # Uncomment to use GPU:
    # runtime: nvidia
    # environment:
    #   - NVIDIA_VISIBLE_DEVICES=all

  # ─── Nginx Reverse Proxy (Production) ──────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: aether_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./scripts/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - aether_certs:/etc/nginx/certs
      - ./web-ui/dist:/usr/share/nginx/html:ro
    depends_on:
      - aetherdev
    networks:
      - aether_network
    profiles:
      - production  # Only start with: docker-compose --profile production up

# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  aether_data:
    driver: local
  aether_plugins:
    driver: local
  redis_data:
    driver: local
  chroma_data:
    driver: local
  ollama_models:
    driver: local
  aether_certs:
    driver: local

# ─── Networks ─────────────────────────────────────────────────────────────────
networks:
  aether_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
