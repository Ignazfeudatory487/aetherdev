name: AetherDev CI/CD

on:
  push:
    branches: [main, develop, 'release/**']
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'
  NODE_ENV: test
  AETHER_LOG_LEVEL: error
  LLM_PROVIDER: ollama

jobs:
  # ─── Lint & Type Check ──────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

      - name: Format check
        run: npx prettier --check "src/**/*.ts" "cli/**/*.ts"

  # ─── Unit Tests ─────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ['18', '20', '22']
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npm run test:coverage
        env:
          SQLITE_PATH: ':memory:'

      - name: Upload coverage report
        if: matrix.node == '20'
        uses: codecov/codecov-action@v4
        with:
          files: coverage/lcov.info
          flags: unit-tests
          token: ${{ secrets.CODECOV_TOKEN }}

  # ─── Python Tests ───────────────────────────────────────────────────────────
  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -e ".[dev]"

      - name: Run mypy type checking
        run: mypy src/ --ignore-missing-imports || true

      - name: Run ruff linter
        run: ruff check src/ || true

      - name: Run pytest
        run: pytest tests/ -v --tb=short -x
        continue-on-error: true

  # ─── Security Scan ──────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Check for hardcoded secrets
        run: |
          echo "Checking for hardcoded secrets..."
          ! grep -rn --include="*.ts" --include="*.js" \
            -E '(password|secret|api_key|apiKey)\s*=\s*["\x27][^"$\x27{]+["\x27]' \
            src/ cli/ || echo "WARNING: Possible hardcoded secrets found"

      - name: Setup Python for bandit
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Python security scan (bandit)
        run: |
          pip install bandit -q
          bandit -r src/ -ll -ii || true

  # ─── Build ──────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Install & Build Web UI
        run: |
          cd web-ui && npm ci && npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aetherdev-build
          path: |
            dist/
            web-ui/dist/
          retention-days: 7

  # ─── Docker Build ───────────────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push for now)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: aetherdev:${{ github.sha }},aetherdev:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}

  # ─── Release ────────────────────────────────────────────────────────────────
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build, docker, security]
    if: startsWith(github.ref, 'refs/heads/release/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: aetherdev-build

      - name: Extract version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: AetherDev v${{ steps.version.outputs.version }}
          body: |
            ## AetherDev v${{ steps.version.outputs.version }}

            Free, open-source AI developer agent. Local-first, zero vendor lock-in.

            ### Installation
            ```bash
            npx aetherdev setup
            # or
            docker-compose up -d
            ```

            ### What's New
            See [CHANGELOG.md](CHANGELOG.md) for full details.
          draft: false
          prerelease: false
          generate_release_notes: true
